<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NxtGenGuard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

/* SPLASH SCREEN */
#splash {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: #020617;
}

#splash h1 {
  font-size: 3rem;
}

#splash button {
  margin-top: 20px;
  padding: 12px 20px;
  background: #2563eb;
  border: none;
  color: white;
  cursor: pointer;
}

/* MAIN SITE */
#main {
  display: none;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.5);
}

/* HERO */
.hero {
  padding: 80px 50px;
}

.services {
  padding: 60px 50px;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>NxtGenGuard</h1>
  <p>Cybersecurity • IT • Automation</p>
  <button onclick="enterSite()">Enter Site</button>
</div>

<!-- MAIN SITE -->
<div id="main">

<nav>
  <div><strong>NxtGenGuard</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Secure Your Digital World</h1>
  <p>Modern cybersecurity solutions for businesses and individuals.</p>
</section>

<section class="services">
  <h2>Services</h2>
  <p>Cybersecurity • IT Support • Network Setup • Data Recovery</p>
</section>

</div>

<script>
function enterSite() {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "block";
}
</script>

</body>
</html>
